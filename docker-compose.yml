services:
  myapp:                 # 第一個服務名稱，這裡命名為 myapp
    build: .             # 告訴 Docker Compose：請在「當前目錄 (.)」尋找 Dockerfile 來打包成映像檔並執行。
    restart: always      # 無論是當機、發生錯誤退出或重新開機，都自動重新啟動這個容器。
    # ==========================================
    # [正式上線版設定]
    # 這裡的設定會被上傳到 GitHub，並在雲端伺服器上執行。
    # ==========================================
    # volumes:
      # 雲端正式用：使用 Docker 保險箱來保護實體檔案
      # (本地開發時請維持註解，否則會蓋掉你的本機資料夾)
      # - nodejsdata:/usr/local/app/dist

    depends_on:
      # 設定依賴關係。Docker 會確保先啟動 Postgres 服務後，才啟動這個 myapp 服務。
      - postgres
    environment:
      # 將原本寫死的 password 改成讀取環境變數
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@postgres:5432/postgres
    networks:
      # 讓這個服務加入名為 mynetwork 的虛擬網路，這樣它才能與資料庫互相溝通。
      - mynetwork
    ports:
      # 將本機電腦（Host）的 3000 port 對應到容器內（Container）的 3000 port。
      # 這讓你可以打開瀏覽器輸入 http://localhost:3000 來存取你的網頁。
      - "3000:3000"

  postgres:               # 第二個服務名稱，用來運行資料庫
    restart: always      # 同樣設定為自動重新啟動。
    image: postgres:14.23-alpine3.23  # 使用 Postgres 映像檔
    environment:
      # 讀取環境變數的密碼
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      # 把資料庫的儲存路徑掛載到名為 postgresdata 的 Volume 裡。
      # 這是極度重要的設定，能確保即使重啟或刪除資料庫容器，資料也不會遺失！
      - postgresdata:/var/lib/postgresql/data
    networks:
      # 一樣加入 mynetwork，讓 myapp 可以連線過來。
      - mynetwork

# 以下是在整個專案中要建立的「資源清單」
# Docker Compose 會先建立這裡定義的資源，再把它們分配給上面的 services 使用

networks:
  mynetwork:             # 宣告一個專屬的虛擬內部網路，名為 mynetwork。Docker 預設會建立一個橋接網路。

volumes:
  nodejsdata:            # 宣告一個名為 nodejsdata 的儲存空間 (對應 myapp 裡面的掛載)
  postgresdata:          # 宣告一個名為 postgresdata 的儲存空間 (對應資料庫的掛載)
